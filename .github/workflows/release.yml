name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to release or recover
        required: true
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  checks: read

env:
  CARGO_TERM_COLOR: always
  CRATES_IO_USER_AGENT: ruviz-release-workflow/1.0 (https://github.com/Ameyanagi/ruviz)
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
  RELEASE_REF: refs/tags/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}

jobs:
  check-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow utilities
        if: github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v4

      - name: Skip CI wait during manual recovery
        if: github.event_name == 'workflow_dispatch'
        run: echo "Manual release dispatch skips push-check waiting."

      - name: Wait for required CI checks to complete
        if: github.event_name != 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/wait_for_github_checks.py \
            --repo "${{ github.repository }}" \
            --sha "${{ github.sha }}" \
            --timeout 2400 \
            --interval 15 \
            --check "Test Fast Lane" \
            --check "Python" \
            --check "Python Packaging"

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: check-ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Ensure wasm target is installed for the pinned toolchain
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Validate release tag matches package versions
        run: |
          TAG="${{ env.RELEASE_TAG }}" python3 <<'PY'
          import json
          import os
          import re
          import sys
          import tomllib
          from pathlib import Path

          tag = os.environ["TAG"]
          match = re.fullmatch(r"v(?P<base>\d+\.\d+\.\d+)(?:-(?P<label>a|b|rc)(?P<num>\d+))?", tag)
          if match is None:
              print(
                  f"Unsupported release tag format: {tag}. Expected vX.Y.Z or vX.Y.Z-(a|b|rc)N",
                  file=sys.stderr,
              )
              sys.exit(1)

          base = match.group("base")
          label = match.group("label")
          number = match.group("num")
          cargo_expected = base if label is None else f"{base}-{label}{number}"
          python_expected = base if label is None else f"{base}{label}{number}"

          with Path("packages/ruviz-web/package.json").open(encoding="utf-8") as fh:
              npm_web_version = json.load(fh)["version"]

          with Path("Cargo.toml").open("rb") as fh:
              ruviz_version = tomllib.load(fh)["package"]["version"]

          with Path("crates/ruviz-web/Cargo.toml").open("rb") as fh:
              rust_web_version = tomllib.load(fh)["package"]["version"]

          with Path("crates/ruviz-gpui/Cargo.toml").open("rb") as fh:
              gpui_version = tomllib.load(fh)["package"]["version"]

          with Path("python/pyproject.toml").open("rb") as fh:
              python_package_version = tomllib.load(fh)["project"]["version"]

          with Path("python/Cargo.toml").open("rb") as fh:
              python_crate_version = tomllib.load(fh)["package"]["version"]

          versions = {
              "ruviz crate": ruviz_version,
              "ruviz-web crate": rust_web_version,
              "ruviz-gpui crate": gpui_version,
              "ruviz npm package": npm_web_version,
              "ruviz-py crate": python_crate_version,
          }

          for name, version in versions.items():
              if version != cargo_expected:
                  print(
                      f"{name} version {version} does not match release tag {tag} "
                      f"(expected {cargo_expected})",
                      file=sys.stderr,
                  )
                  sys.exit(1)

          if python_package_version != python_expected:
              print(
                  f"python package version {python_package_version} does not match release tag {tag} "
                  f"(expected {python_expected})",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install JS workspace dependencies
        run: bun install --frozen-lockfile

      - name: Check JS/TS formatting and lint
        run: bun run check:web

      - name: Install GPUI Linux build dependencies
        uses: ./.github/actions/install-linux-desktop-build-deps

      - name: Build release
        run: cargo build --release --all-features

      # Tests already run in CI workflow (check-ci job waits for it)

      - name: Build documentation
        run: cargo doc --no-deps --all-features

      - name: Verify ruviz-gpui compiles
        run: cargo check -p ruviz-gpui

      - name: Verify ruviz-gpui examples compile
        run: cargo check -p ruviz-gpui --examples

      - name: Build JS/TS web package
        run: bun run --cwd packages/ruviz-web build

      - name: Validate npm tarball
        run: bun run --cwd packages/ruviz-web pack:dry

  build-python-sdist:
    name: Build Python sdist
    runs-on: ubuntu-latest
    needs: [build-release, build-python-widget-bundle]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Download canonical widget bundle
        uses: actions/download-artifact@v4
        with:
          name: python-widget-bundle
          path: .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: v1.12.6
          command: sdist
          args: --out dist
          working-directory: python

      - name: Upload Python sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-sdist
          path: python/dist/*.tar.gz
          if-no-files-found: error

  build-python-wheel-macos-intel:
    name: Build Python wheel (macOS Intel)
    runs-on: macos-15-intel
    needs: [build-release, build-python-widget-bundle]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Download canonical widget bundle
        uses: actions/download-artifact@v4
        with:
          name: python-widget-bundle
          path: .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS Intel wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.12.6
          rust-toolchain: 1.94.1
          working-directory: python
          args: --release --out dist

      - name: Upload macOS Intel wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-macos-intel
          path: python/dist/*.whl
          if-no-files-found: error

  build-python-wheel-macos-arm:
    name: Build Python wheel (macOS Apple Silicon)
    runs-on: macos-14
    needs: [build-release, build-python-widget-bundle]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Download canonical widget bundle
        uses: actions/download-artifact@v4
        with:
          name: python-widget-bundle
          path: .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS Apple Silicon wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.12.6
          rust-toolchain: 1.94.1
          working-directory: python
          args: --release --out dist

      - name: Upload macOS Apple Silicon wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-macos-arm
          path: python/dist/*.whl
          if-no-files-found: error

  build-python-wheel-windows:
    name: Build Python wheel (Windows)
    runs-on: windows-latest
    needs: [build-release, build-python-widget-bundle]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Download canonical widget bundle
        uses: actions/download-artifact@v4
        with:
          name: python-widget-bundle
          path: .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.12.6
          rust-toolchain: 1.94.1
          working-directory: python
          args: --release --out dist

      - name: Upload Windows wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-windows
          path: python/dist/*.whl
          if-no-files-found: error

  build-python-wheel-linux:
    name: Build Python wheel (Linux)
    runs-on: ubuntu-latest
    needs: [build-release, build-python-widget-bundle]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Download canonical widget bundle
        uses: actions/download-artifact@v4
        with:
          name: python-widget-bundle
          path: .

      - name: Build Linux wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.12.6
          rust-toolchain: 1.94.1
          manylinux: 2_28
          target: x86_64-unknown-linux-gnu
          working-directory: python
          args: --release --out dist --compatibility pypi --interpreter python3.10 --no-default-features --features pyo3/extension-module

      - name: Upload Linux wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-linux
          path: python/dist/*.whl
          if-no-files-found: error

  build-python-widget-bundle:
    name: Build canonical Python widget bundle
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Ensure wasm target is installed for the pinned toolchain
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-python-widget-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-python-widget-

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install JS workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build canonical widget bundle
        run: bun run build:python-widget

      - name: Upload canonical widget bundle
        uses: actions/upload-artifact@v4
        with:
          name: python-widget-bundle
          path: python/ruviz_py/ruviz/widget.js
          if-no-files-found: error

  publish-ruviz:
    name: Publish ruviz to crates.io
    runs-on: ubuntu-latest
    needs: build-release
    # Only publish on non-prerelease tags
    if: ${{ !contains((github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag) || github.ref_name, '-') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Detect published ruviz version
        id: ruviz-version
        run: |
          VERSION="$(cargo pkgid -p ruviz | sed 's/.*[#@]//')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if curl --silent --fail \
              --header "User-Agent: ${CRATES_IO_USER_AGENT}" \
              "https://crates.io/api/v1/crates/ruviz/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish ruviz to crates.io
        if: steps.ruviz-version.outputs.published != 'true'
        run: cargo publish --package ruviz --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Skip ruviz publish
        if: steps.ruviz-version.outputs.published == 'true'
        run: echo "ruviz v${{ steps.ruviz-version.outputs.version }} is already published on crates.io"

  publish-ruviz-web:
    name: Publish ruviz-web to crates.io
    runs-on: ubuntu-latest
    needs: publish-ruviz
    if: ${{ !contains((github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag) || github.ref_name, '-') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Detect published ruviz-web version
        id: web-version
        run: |
          VERSION="$(cargo pkgid -p ruviz-web | sed 's/.*[#@]//')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if curl --silent --fail \
              --header "User-Agent: ${CRATES_IO_USER_AGENT}" \
              "https://crates.io/api/v1/crates/ruviz-web/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for ruviz-web packaging to resolve against crates.io
        if: steps.web-version.outputs.published != 'true'
        run: |
          last_output=""

          for attempt in $(seq 1 60); do
            if output="$(cargo package --package ruviz-web --allow-dirty --no-verify 2>&1)"; then
              exit 0
            fi

            last_output="${output}"
            echo "Waiting for crates.io index to serve ruviz-web dependencies (attempt ${attempt}/60)..."
            sleep 20
          done

          echo "Timed out waiting for ruviz-web packaging to resolve against crates.io"
          if [ -n "${last_output}" ]; then
            echo "Last cargo package error output:"
            printf '%s\n' "${last_output}"
          fi
          exit 1

      - name: Publish ruviz-web to crates.io
        if: steps.web-version.outputs.published != 'true'
        run: cargo publish --package ruviz-web --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Skip ruviz-web publish
        if: steps.web-version.outputs.published == 'true'
        run: echo "ruviz-web v${{ steps.web-version.outputs.version }} is already published on crates.io"

  publish-ruviz-gpui:
    name: Publish ruviz-gpui to crates.io
    runs-on: ubuntu-latest
    needs: publish-ruviz
    if: ${{ !contains((github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag) || github.ref_name, '-') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Detect published ruviz-gpui version
        id: gpui-version
        run: |
          VERSION="$(cargo pkgid -p ruviz-gpui | sed 's/.*[#@]//')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if curl --silent --fail \
              --header "User-Agent: ${CRATES_IO_USER_AGENT}" \
              "https://crates.io/api/v1/crates/ruviz-gpui/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install GPUI Linux build dependencies
        if: steps.gpui-version.outputs.published != 'true'
        uses: ./.github/actions/install-linux-desktop-build-deps

      - name: Wait for ruviz-gpui packaging to resolve against crates.io
        if: steps.gpui-version.outputs.published != 'true'
        run: |
          last_output=""

          for attempt in $(seq 1 60); do
            if output="$(cargo package --package ruviz-gpui --allow-dirty --no-verify 2>&1)"; then
              exit 0
            fi

            last_output="${output}"
            echo "Waiting for crates.io index to serve ruviz-gpui dependencies (attempt ${attempt}/60)..."
            sleep 20
          done

          echo "Timed out waiting for ruviz-gpui packaging to resolve against crates.io"
          if [ -n "${last_output}" ]; then
            echo "Last cargo package error output:"
            printf '%s\n' "${last_output}"
          fi
          exit 1

      - name: Publish ruviz-gpui to crates.io
        if: steps.gpui-version.outputs.published != 'true'
        run: cargo publish --package ruviz-gpui --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Skip ruviz-gpui publish
        if: steps.gpui-version.outputs.published == 'true'
        run: echo "ruviz-gpui v${{ steps.gpui-version.outputs.version }} is already published on crates.io"

  publish-npm-web:
    name: Publish ruviz JS SDK to npm
    runs-on: ubuntu-latest
    needs: [publish-ruviz, publish-ruviz-web]
    if: ${{ !contains((github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag) || github.ref_name, '-') }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Ensure wasm target is installed for the pinned toolchain
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-web-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-web-

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install JS workspace dependencies
        run: bun install --frozen-lockfile

      - name: Check JS/TS formatting and lint
        run: bun run check:web

      - name: Validate npm package version matches release tag
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          VERSION="$(python3 -c "import json; print(json.load(open('packages/ruviz-web/package.json'))['version'])")"

          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "Release tag ${TAG} does not match npm package version v${VERSION}"
            exit 1
          fi

      - name: Build npm package
        run: bun run --cwd packages/ruviz-web build

      - name: Validate npm tarball
        run: bun run --cwd packages/ruviz-web pack:dry

      - name: Detect published npm package version
        id: npm-version
        run: |
          PACKAGE_NAME="$(python3 -c "import json; print(json.load(open('packages/ruviz-web/package.json'))['name'])")"
          VERSION="$(python3 -c "import json; print(json.load(open('packages/ruviz-web/package.json'))['version'])")"
          echo "package=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish npm package
        if: steps.npm-version.outputs.published != 'true'
        # npm Trusted Publishing is configured for the `ruviz` package, so
        # GitHub OIDC supplies publish authentication and provenance here.
        run: cd packages/ruviz-web && npm publish --access public --provenance

      - name: Skip npm publish
        if: steps.npm-version.outputs.published == 'true'
        run: echo "${{ steps.npm-version.outputs.package }} v${{ steps.npm-version.outputs.version }} is already published on npm"

  publish-python:
    name: Publish Python package to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-python-sdist
      - build-python-wheel-linux
      - build-python-wheel-macos-intel
      - build-python-wheel-macos-arm
      - build-python-wheel-windows
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/ruviz
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist
          merge-multiple: true

      - name: Detect published Python package files
        id: python-version
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import tomllib
          import urllib.error
          import urllib.request
          from pathlib import Path

          with Path("python/pyproject.toml").open("rb") as fh:
              version = tomllib.load(fh)["project"]["version"]

          local_files = sorted(path.name for path in Path("dist").iterdir() if path.is_file())
          if not local_files:
              raise SystemExit("No Python distributions were downloaded for publishing")

          remote_files = []
          try:
              with urllib.request.urlopen(
                  f"https://pypi.org/pypi/ruviz/{version}/json",
                  timeout=15,
              ) as response:
                  payload = json.load(response)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          else:
              remote_files = sorted(file_info["filename"] for file_info in payload.get("urls", []))

          published = bool(remote_files) and remote_files == local_files

          print(f"version={version}")
          print(f"published={'true' if published else 'false'}")
          PY

      - name: Publish Python package
        if: steps.python-version.outputs.published != 'true'
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist
          skip-existing: true

      - name: Skip Python publish
        if: steps.python-version.outputs.published == 'true'
        run: echo "ruviz v${{ steps.python-version.outputs.version }} is already published on PyPI"

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, publish-ruviz, publish-ruviz-web, publish-ruviz-gpui, publish-npm-web, publish-python]
    if: ${{ always() && needs.build-release.result == 'success' && (needs.publish-ruviz.result == 'success' || needs.publish-ruviz.result == 'skipped') && (needs.publish-ruviz-web.result == 'success' || needs.publish-ruviz-web.result == 'skipped') && (needs.publish-ruviz-gpui.result == 'success' || needs.publish-ruviz-gpui.result == 'skipped') && (needs.publish-npm-web.result == 'success' || needs.publish-npm-web.result == 'skipped') && needs.publish-python.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Prepare release notes body
        run: |
          TAG="${{ env.RELEASE_TAG }}"
          VERSIONED_NOTES_PATH="docs/releases/${TAG}.md"

          if [ -f "${VERSIONED_NOTES_PATH}" ]; then
            echo "Using versioned release notes: ${VERSIONED_NOTES_PATH}"
            cp "${VERSIONED_NOTES_PATH}" RELEASE_NOTES.md
          else
            echo "Versioned release notes not found at ${VERSIONED_NOTES_PATH}; generating fallback body."
            {
              echo "## Release ${TAG}"
              echo ""
              echo "### Changes"
              echo "See [CHANGELOG.md](CHANGELOG.md) for details."
              echo ""
              echo "### Documentation"
              echo "- View the [API Documentation](https://docs.rs/ruviz)"
            } > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

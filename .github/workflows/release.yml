name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CRATES_IO_USER_AGENT: ruviz-release-workflow/1.0 (https://github.com/Ameyanagi/ruviz)

jobs:
  check-ci:
    name: Wait for CI
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to complete
        uses: fountainhead/action-wait-for-check@v1.2.0
        id: wait-for-ci
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: 'Test Fast Lane'
          ref: ${{ github.sha }}
          timeoutSeconds: 600
          intervalSeconds: 15

      - name: Fail if CI failed
        if: steps.wait-for-ci.outputs.conclusion != 'success'
        run: |
          echo "CI check failed with conclusion: ${{ steps.wait-for-ci.outputs.conclusion }}"
          exit 1

  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    needs: check-ci
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Validate release tag matches ruviz version
        run: |
          VERSION="$(cargo pkgid -p ruviz | sed 's/.*[#@]//')"
          TAG="${{ github.ref_name }}"

          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "Release tag ${TAG} does not match ruviz version v${VERSION}"
            exit 1
          fi

      - name: Validate web package versions match release tag
        run: |
          TAG="${{ github.ref_name }}"
          RUST_WEB_VERSION="$(cargo pkgid -p ruviz-web | sed 's/.*[#@]//')"
          NPM_WEB_VERSION="$(python3 -c "import json; print(json.load(open('packages/ruviz-web/package.json'))['version'])")"

          if [ "v${RUST_WEB_VERSION}" != "${TAG}" ]; then
            echo "Release tag ${TAG} does not match ruviz-web crate version v${RUST_WEB_VERSION}"
            exit 1
          fi

          if [ "${NPM_WEB_VERSION}" != "${RUST_WEB_VERSION}" ]; then
            echo "packages/ruviz-web version ${NPM_WEB_VERSION} does not match ruviz-web crate version ${RUST_WEB_VERSION}"
            exit 1
          fi

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install JS workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build release
        run: cargo build --release --all-features

      # Tests already run in CI workflow (check-ci job waits for it)

      - name: Build documentation
        run: cargo doc --no-deps --all-features

      - name: Verify ruviz-gpui compiles
        run: cargo check -p ruviz-gpui

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build JS/TS web package
        run: bun run --cwd packages/ruviz-web build

      - name: Validate npm tarball
        run: bun run --cwd packages/ruviz-web pack:dry

  publish-ruviz:
    name: Publish ruviz to crates.io
    runs-on: ubuntu-latest
    needs: build-release
    # Only publish on non-prerelease tags
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Detect published ruviz version
        id: ruviz-version
        run: |
          VERSION="$(cargo pkgid -p ruviz | sed 's/.*[#@]//')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if curl --silent --fail \
              --header "User-Agent: ${CRATES_IO_USER_AGENT}" \
              "https://crates.io/api/v1/crates/ruviz/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish ruviz to crates.io
        if: steps.ruviz-version.outputs.published != 'true'
        run: cargo publish --package ruviz --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Skip ruviz publish
        if: steps.ruviz-version.outputs.published == 'true'
        run: echo "ruviz v${{ steps.ruviz-version.outputs.version }} is already published on crates.io"

  publish-ruviz-web:
    name: Publish ruviz-web to crates.io
    runs-on: ubuntu-latest
    needs: publish-ruviz
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Detect published ruviz-web version
        id: web-version
        run: |
          VERSION="$(cargo pkgid -p ruviz-web | sed 's/.*[#@]//')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if curl --silent --fail \
              --header "User-Agent: ${CRATES_IO_USER_AGENT}" \
              "https://crates.io/api/v1/crates/ruviz-web/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for ruviz-web packaging to resolve against crates.io
        if: steps.web-version.outputs.published != 'true'
        run: |
          last_output=""

          for attempt in $(seq 1 60); do
            if output="$(cargo package --package ruviz-web --allow-dirty --no-verify 2>&1)"; then
              exit 0
            fi

            last_output="${output}"
            echo "Waiting for crates.io index to serve ruviz-web dependencies (attempt ${attempt}/60)..."
            sleep 20
          done

          echo "Timed out waiting for ruviz-web packaging to resolve against crates.io"
          if [ -n "${last_output}" ]; then
            echo "Last cargo package error output:"
            printf '%s\n' "${last_output}"
          fi
          exit 1

      - name: Publish ruviz-web to crates.io
        if: steps.web-version.outputs.published != 'true'
        run: cargo publish --package ruviz-web --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Skip ruviz-web publish
        if: steps.web-version.outputs.published == 'true'
        run: echo "ruviz-web v${{ steps.web-version.outputs.version }} is already published on crates.io"

  publish-ruviz-gpui:
    name: Publish ruviz-gpui to crates.io
    runs-on: ubuntu-latest
    needs: publish-ruviz
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Detect published ruviz-gpui version
        id: gpui-version
        run: |
          VERSION="$(cargo pkgid -p ruviz-gpui | sed 's/.*[#@]//')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if curl --silent --fail \
              --header "User-Agent: ${CRATES_IO_USER_AGENT}" \
              "https://crates.io/api/v1/crates/ruviz-gpui/${VERSION}" >/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for ruviz-gpui packaging to resolve against crates.io
        if: steps.gpui-version.outputs.published != 'true'
        run: |
          last_output=""

          for attempt in $(seq 1 60); do
            if output="$(cargo package --package ruviz-gpui --allow-dirty --no-verify 2>&1)"; then
              exit 0
            fi

            last_output="${output}"
            echo "Waiting for crates.io index to serve ruviz-gpui dependencies (attempt ${attempt}/60)..."
            sleep 20
          done

          echo "Timed out waiting for ruviz-gpui packaging to resolve against crates.io"
          if [ -n "${last_output}" ]; then
            echo "Last cargo package error output:"
            printf '%s\n' "${last_output}"
          fi
          exit 1

      - name: Publish ruviz-gpui to crates.io
        if: steps.gpui-version.outputs.published != 'true'
        run: cargo publish --package ruviz-gpui --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Skip ruviz-gpui publish
        if: steps.gpui-version.outputs.published == 'true'
        run: echo "ruviz-gpui v${{ steps.gpui-version.outputs.version }} is already published on crates.io"

  publish-npm-web:
    name: Publish ruviz JS SDK to npm
    runs-on: ubuntu-latest
    needs: [publish-ruviz, publish-ruviz-web, publish-ruviz-gpui]
    if: ${{ !contains(github.ref_name, '-') }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-web-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-web-

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install JS workspace dependencies
        run: bun install --frozen-lockfile

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Validate npm package version matches release tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="$(python3 -c "import json; print(json.load(open('packages/ruviz-web/package.json'))['version'])")"

          if [ "v${VERSION}" != "${TAG}" ]; then
            echo "Release tag ${TAG} does not match npm package version v${VERSION}"
            exit 1
          fi

      - name: Build npm package
        run: bun run --cwd packages/ruviz-web build

      - name: Validate npm tarball
        run: bun run --cwd packages/ruviz-web pack:dry

      - name: Detect published npm package version
        id: npm-version
        run: |
          PACKAGE_NAME="$(python3 -c "import json; print(json.load(open('packages/ruviz-web/package.json'))['name'])")"
          VERSION="$(python3 -c "import json; print(json.load(open('packages/ruviz-web/package.json'))['version'])")"
          echo "package=${PACKAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          if npm view "${PACKAGE_NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish npm package
        if: steps.npm-version.outputs.published != 'true'
        run: cd packages/ruviz-web && npm publish --access public

      - name: Skip npm publish
        if: steps.npm-version.outputs.published == 'true'
        run: echo "${{ steps.npm-version.outputs.package }} v${{ steps.npm-version.outputs.version }} is already published on npm"

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, publish-ruviz, publish-ruviz-web, publish-ruviz-gpui, publish-npm-web]
    if: ${{ always() && needs.build-release.result == 'success' && (needs.publish-ruviz.result == 'success' || needs.publish-ruviz.result == 'skipped') && (needs.publish-ruviz-web.result == 'success' || needs.publish-ruviz-web.result == 'skipped') && (needs.publish-ruviz-gpui.result == 'success' || needs.publish-ruviz-gpui.result == 'skipped') && (needs.publish-npm-web.result == 'success' || needs.publish-npm-web.result == 'skipped') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare release notes body
        run: |
          TAG="${{ github.ref_name }}"
          VERSIONED_NOTES_PATH="docs/releases/${TAG}.md"

          if [ -f "${VERSIONED_NOTES_PATH}" ]; then
            echo "Using versioned release notes: ${VERSIONED_NOTES_PATH}"
            cp "${VERSIONED_NOTES_PATH}" RELEASE_NOTES.md
          else
            echo "Versioned release notes not found at ${VERSIONED_NOTES_PATH}; generating fallback body."
            {
              echo "## Release ${TAG}"
              echo ""
              echo "### Changes"
              echo "See [CHANGELOG.md](CHANGELOG.md) for details."
              echo ""
              echo "### Documentation"
              echo "- View the [API Documentation](https://docs.rs/ruviz)"
            } > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

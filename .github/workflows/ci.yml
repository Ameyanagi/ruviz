name: CI

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy -- -D warnings

  test-fast:
    name: Test Fast Lane
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Create test output directories
        run: |
          mkdir -p generated/tests/render
          mkdir -p generated/tests/export/{png,svg,raw,direct}

      - name: Run library tests
        run: cargo test --lib --verbose

      - name: Compile integration tests
        run: cargo test --tests --no-run --verbose

      - name: Run fast deterministic integration suites
        run: cargo test --test simple_api_test --test data_format_compatibility_test --test backend_parity_test --verbose

      - name: Run doc tests
        run: cargo test --doc --verbose

  test-visual-heavy:
    name: Test Visual Heavy Lane
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-visual-heavy-${{ hashFiles('**/Cargo.lock') }}

      - name: Create test output directories
        run: |
          mkdir -p generated/tests/render
          mkdir -p generated/tests/export/{png,svg,raw,direct}

      - name: Run visual output suite
        run: cargo test --test visual_output_tests_fixed --verbose

      - name: Run export format suite
        run: cargo test --test export_format_tests --verbose

      - name: Run heavy validation suites
        run: cargo test --test performance_validation --verbose

  msrv:
    name: MSRV (1.92)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust 1.92
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux desktop build dependencies
        uses: ./.github/actions/install-linux-desktop-build-deps

      - name: Check MSRV
        run: cargo check --all-features

  python:
    name: Python
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          working-directory: python

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install Linux desktop build dependencies
        uses: ./.github/actions/install-linux-desktop-build-deps

      - name: Sync Python dependencies
        run: cd python && uv sync

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install JS workspace dependencies
        run: bun install --frozen-lockfile

      - name: Verify notebook widget bundle is reproducible
        run: |
          bun run build:python-widget
          first_widget="$(mktemp)"
          cp python/ruviz_py/ruviz/widget.js "${first_widget}"
          bun run build:python-widget
          sha256sum "${first_widget}" python/ruviz_py/ruviz/widget.js
          cmp --silent "${first_widget}" python/ruviz_py/ruviz/widget.js

      - name: Run Python extension tests
        run: cd python && uv run cargo test

      - name: Run Python package tests
        run: cd python && uv run pytest

      - name: Run Python lint
        run: cd python && uv run ruff check

  platform-build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macOS
            os: macos-latest
            target: aarch64-apple-darwin
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: FreeBSD
            os: ubuntu-latest
            target: x86_64-unknown-freebsd
            cross: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install GPUI Linux build dependencies
        if: matrix.platform.name == 'Linux'
        uses: ./.github/actions/install-linux-desktop-build-deps

      - name: Install cross
        if: matrix.platform.cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build (cross)
        if: matrix.platform.cross
        run: cross check --target ${{ matrix.platform.target }}

      - name: Build (native)
        if: ${{ !matrix.platform.cross }}
        run: cargo check --target ${{ matrix.platform.target }}

      - name: Check interactive desktop build
        if: ${{ !matrix.platform.cross }}
        run: cargo check --target ${{ matrix.platform.target }} --features interactive

      - name: Check ruviz-gpui desktop build
        if: ${{ !matrix.platform.cross }}
        run: cargo check --target ${{ matrix.platform.target }} -p ruviz-gpui

      - name: Check ruviz-gpui desktop examples
        if: ${{ !matrix.platform.cross }}
        run: cargo check --target ${{ matrix.platform.target }} -p ruviz-gpui --examples

  wasm-web:
    name: WASM + Web
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-web-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-web-

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Check core wasm targets
        run: |
          cargo check --target wasm32-unknown-unknown --no-default-features
          cargo check --target wasm32-unknown-unknown --no-default-features --features svg
          cargo check --target wasm32-unknown-unknown --no-default-features --features gpu

      - name: Check ruviz-web
        run: cargo check -p ruviz-web --target wasm32-unknown-unknown

      - name: Install JS workspace dependencies
        run: bun install --frozen-lockfile

      - name: Check JS/TS formatting and lint
        run: bun run check:web

      - name: Build web SDK and demo
        run: bun run build:web

      - name: Install Playwright browsers
        run: bun run install:web-browsers

      - name: Run browser smoke tests
        run: bun run test:web

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux desktop build dependencies
        uses: ./.github/actions/install-linux-desktop-build-deps

      - name: Check published docs do not reference generated preview assets
        run: uv run python scripts/check_no_generated_asset_refs.py

      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  generated-preview:
    name: Generated Preview
    runs-on: ubuntu-latest
    needs: [test-fast, python, wasm-web, docs]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          working-directory: python

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-generated-preview-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-generated-preview-

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install Linux desktop build dependencies
        uses: ./.github/actions/install-linux-desktop-build-deps

      - name: Sync Python dependencies
        run: cd python && uv sync

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Install JS workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build generated preview artifacts
        run: make build-generated-preview

      - name: Compare manifest to base branch
        id: manifest
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags --depth=1 origin "${BASE_REF}"
          if git show "origin/${BASE_REF}:generated/manifest.json" > /tmp/base-generated-manifest.json 2>/dev/null; then
            if cmp -s /tmp/base-generated-manifest.json generated/manifest.json; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Package preview artifacts
        id: package
        if: steps.manifest.outputs.changed == 'true'
        run: |
          preview_examples=()
          for path in generated/examples; do
            if [ -d "$path" ]; then
              preview_examples+=("$path")
            fi
          done
          if [ ${#preview_examples[@]} -eq 0 ]; then
            mkdir -p generated/empty-preview
            preview_examples=("generated/empty-preview")
          fi
          tar -czf generated-preview-examples.tar.gz "${preview_examples[@]}"
          tar -czf generated-preview-python-site.tar.gz generated/python/site
          tar -czf generated-preview-web-docs.tar.gz generated/web/docs
          echo "examples_size=$(du -sh generated-preview-examples.tar.gz | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "python_site_size=$(du -sh generated-preview-python-site.tar.gz | cut -f1)" >> "$GITHUB_OUTPUT"
          echo "web_docs_size=$(du -sh generated-preview-web-docs.tar.gz | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload examples preview
        if: steps.manifest.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-preview-examples
          path: generated-preview-examples.tar.gz
          retention-days: 7
          if-no-files-found: error

      - name: Upload Python docs preview
        if: steps.manifest.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-preview-python-site
          path: generated-preview-python-site.tar.gz
          retention-days: 7
          if-no-files-found: error

      - name: Upload web docs preview
        if: steps.manifest.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-preview-web-docs
          path: generated-preview-web-docs.tar.gz
          retention-days: 7
          if-no-files-found: error

      - name: Upload manifest
        if: steps.manifest.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-manifest
          path: generated/manifest.json
          retention-days: 7
          if-no-files-found: error

      - name: Update pull request comment
        if: github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        env:
          MANIFEST_CHANGED: ${{ steps.manifest.outputs.changed }}
          EXAMPLES_SIZE: ${{ steps.package.outputs.examples_size }}
          PYTHON_SITE_SIZE: ${{ steps.package.outputs.python_site_size }}
          WEB_DOCS_SIZE: ${{ steps.package.outputs.web_docs_size }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        with:
          script: |
            const marker = "<!-- generated-preview-comment -->";
            const changed = process.env.MANIFEST_CHANGED === "true";
            const body = changed
              ? `${marker}
            ## Generated Preview Artifacts

            Generated output changed relative to \`${process.env.BASE_REF}\`.

            - \`generated-preview-examples\` (${process.env.EXAMPLES_SIZE})
            - \`generated-preview-python-site\` (${process.env.PYTHON_SITE_SIZE})
            - \`generated-preview-web-docs\` (${process.env.WEB_DOCS_SIZE})
            - \`generated-manifest\`

            Workflow run: ${process.env.RUN_URL}

            Published docs still read only from committed assets under \`docs/assets/**\`, \`python/docs/assets/gallery/**\`, and \`tests/fixtures/golden/**\`.`
              : `${marker}
            ## Generated Preview Artifacts

            The regenerated \`generated/manifest.json\` matches \`${process.env.BASE_REF}\`, so CI did not upload fresh preview archives for this PR.

            Workflow run: ${process.env.RUN_URL}

            Published docs still read only from committed assets under \`docs/assets/**\`, \`python/docs/assets/gallery/**\`, and \`tests/fixtures/golden/**\`.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) =>
              comment.user?.type === "Bot" && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

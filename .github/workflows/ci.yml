name: CI

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy -- -D warnings

  test-fast:
    name: Test Fast Lane
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Create test output directories
        run: |
          mkdir -p tests/output
          mkdir -p export_test_output/{png,svg,raw,direct}

      - name: Run library tests
        run: cargo test --lib --verbose

      - name: Compile integration tests
        run: cargo test --tests --no-run --verbose

      - name: Run fast deterministic integration suites
        run: cargo test --test simple_api_test --test data_format_compatibility_test --test backend_parity_test --verbose

      - name: Run doc tests
        run: cargo test --doc --verbose

  test-visual-heavy:
    name: Test Visual Heavy Lane
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-visual-heavy-${{ hashFiles('**/Cargo.lock') }}

      - name: Create test output directories
        run: |
          mkdir -p tests/output
          mkdir -p export_test_output/{png,svg,raw,direct}

      - name: Run visual output suite
        run: cargo test --test visual_output_tests_fixed --verbose

      - name: Run export format suite
        run: cargo test --test export_format_tests --verbose

      - name: Run heavy validation suites
        run: cargo test --test performance_validation --verbose

  msrv:
    name: MSRV (1.87)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.87.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}

      - name: Check MSRV
        run: cargo check --all-features

  platform-build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macOS
            os: macos-latest
            target: aarch64-apple-darwin
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: FreeBSD
            os: ubuntu-latest
            target: x86_64-unknown-freebsd
            cross: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross
        if: matrix.platform.cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build (cross)
        if: matrix.platform.cross
        run: cross check --target ${{ matrix.platform.target }}

      - name: Build (native)
        if: ${{ !matrix.platform.cross }}
        run: cargo check --target ${{ matrix.platform.target }}

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}

      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

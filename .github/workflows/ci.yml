name: CI

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy -- -D warnings

  test-fast:
    name: Test Fast Lane
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Create test output directories
        run: |
          mkdir -p tests/output
          mkdir -p export_test_output/{png,svg,raw,direct}

      - name: Run library tests
        run: cargo test --lib --verbose

      - name: Compile integration tests
        run: cargo test --tests --no-run --verbose

      - name: Run fast deterministic integration suites
        run: cargo test --test simple_api_test --test data_format_compatibility_test --test backend_parity_test --verbose

      - name: Run doc tests
        run: cargo test --doc --verbose

  test-visual-heavy:
    name: Test Visual Heavy Lane
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-visual-heavy-${{ hashFiles('**/Cargo.lock') }}

      - name: Create test output directories
        run: |
          mkdir -p tests/output
          mkdir -p export_test_output/{png,svg,raw,direct}

      - name: Run visual output suite
        run: cargo test --test visual_output_tests_fixed --verbose

      - name: Run export format suite
        run: cargo test --test export_format_tests --verbose

      - name: Run heavy validation suites
        run: cargo test --test performance_validation --verbose

  msrv:
    name: MSRV (1.92)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust 1.92
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.92.0

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux desktop build dependencies
        run: |
          # `--all-features` enables the Linux desktop stack via rfd/winit/arboard.
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libasound2-dev \
            libfontconfig-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libsqlite3-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            pkg-config

      - name: Check MSRV
        run: cargo check --all-features

  platform-build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: macOS
            os: macos-latest
            target: aarch64-apple-darwin
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: FreeBSD
            os: ubuntu-latest
            target: x86_64-unknown-freebsd
            cross: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.platform.target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Install GPUI Linux build dependencies
        if: matrix.platform.name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libasound2-dev \
            libfontconfig-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libsqlite3-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            pkg-config

      - name: Install cross
        if: matrix.platform.cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build (cross)
        if: matrix.platform.cross
        run: cross check --target ${{ matrix.platform.target }}

      - name: Build (native)
        if: ${{ !matrix.platform.cross }}
        run: cargo check --target ${{ matrix.platform.target }}

      - name: Check interactive desktop build
        if: ${{ !matrix.platform.cross }}
        run: cargo check --target ${{ matrix.platform.target }} --features interactive

      - name: Check ruviz-gpui desktop build
        if: ${{ !matrix.platform.cross }}
        run: cargo check --target ${{ matrix.platform.target }} -p ruviz-gpui

      - name: Check ruviz-gpui desktop examples
        if: ${{ !matrix.platform.cross }}
        run: cargo check --target ${{ matrix.platform.target }} -p ruviz-gpui --examples

  wasm-web:
    name: WASM + Web
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-web-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-web-

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Check core wasm targets
        run: |
          cargo check --target wasm32-unknown-unknown --no-default-features
          cargo check --target wasm32-unknown-unknown --no-default-features --features svg
          cargo check --target wasm32-unknown-unknown --no-default-features --features gpu

      - name: Check ruviz-web
        run: cargo check -p ruviz-web --target wasm32-unknown-unknown

      - name: Install JS workspace dependencies
        run: bun install --frozen-lockfile

      - name: Check JS/TS formatting and lint
        run: bun run check:web

      - name: Build web SDK and demo
        run: bun run build:web

      - name: Install Playwright browsers
        run: bun run install:web-browsers

      - name: Run browser smoke tests
        run: bun run test:web

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Linux desktop build dependencies
        run: |
          # `--all-features` enables the Linux desktop stack via rfd/winit/arboard.
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            cmake \
            libasound2-dev \
            libfontconfig-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libsqlite3-dev \
            libssl-dev \
            libva-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libzstd-dev \
            pkg-config

      - name: Build documentation
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

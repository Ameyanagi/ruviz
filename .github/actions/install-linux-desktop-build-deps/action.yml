name: Install Linux desktop build dependencies
description: Install the Ubuntu packages required for Linux desktop builds and docs checks
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          clang \
          cmake \
          libasound2-dev \
          libfontconfig-dev \
          libglib2.0-dev \
          libgtk-3-dev \
          libsqlite3-dev \
          libssl-dev \
          libva-dev \
          libvulkan1 \
          libwayland-dev \
          libx11-xcb-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libzstd-dev \
          pkg-config
